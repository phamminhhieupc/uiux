<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mobile Home Demo - Small Screen Optimized</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
    crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="01-mobile-home.css">
</head>

<body data-theme="hig" data-viewport="mobile">

  <div class="mobile-container">
    <main class="container-fluid px-3 py-4 d-flex flex-column flex-grow-1">

      <header class="d-flex align-items-center justify-content-between mb-4">
        <h1 style="font-size: 1.5rem;">City Explorer</h1>
        <button class="btn btn-outline-brand btn-sm" type="button">
          <i class="bi bi-search"></i>
        </button>
      </header>

      <section class="content-card hero-card p-4 mb-4 text-center rounded-4">
        <div>
          <span class="badge badge-soft mb-2">Weekend Pick</span>
          <h2 class="h4 mt-1">Welcome Back</h2>
          <p class="mt-2 text-uppercase fw-light" style="letter-spacing: 1px; font-size: 0.8rem;">
            Plan your next weekend in one tap.
          </p>
        </div>
      </section>

      <section class="d-flex flex-column gap-3 mb-4">

        <article class="content-card border p-3 rounded-4 d-flex align-items-center justify-content-between shadow-sm">
          <div class="pe-2">
            <h3 style="font-size: 1.1rem" class="mb-1">Old Town Market</h3>
            <p class="small">Food and crafts</p>
          </div>
          <button class="btn btn-brand btn-sm px-3" type="button">View</button>
        </article>

        <article class="content-card border p-3 rounded-4 d-flex align-items-center justify-content-between shadow-sm">
          <div class="pe-2">
            <h3 style="font-size: 1.1rem" class="mb-1">River Walk</h3>
            <p class="small">Morning trail</p>
          </div>
          <button class="btn btn-brand btn-sm px-3" type="button">View</button>
        </article>

        <article class="content-card border p-3 rounded-4 d-flex align-items-center justify-content-between shadow-sm">
          <div class="pe-2">
            <h3 style="font-size: 1.1rem" class="mb-1">Art Street</h3>
            <p class="small">Weekend events</p>
          </div>
          <button class="btn btn-brand btn-sm px-3" type="button">View</button>
        </article>

      </section>

    </main>

    <nav class="content-card bottom-nav p-3 d-flex justify-content-around align-items-center shadow-lg"
      aria-label="Bottom navigation">
      <strong class="d-flex flex-column align-items-center" style="color: var(--color-primary); cursor: pointer;">
        <i class="bi bi-house-door-fill fs-5 mb-1"></i>
        Home
      </strong>
      <span class="d-flex flex-column align-items-center" style="cursor: pointer;">
        <i class="bi bi-map fs-5 mb-1"></i>
        Map
      </span>
      <span class="d-flex flex-column align-items-center" style="cursor: pointer;">
        <i class="bi bi-bookmark fs-5 mb-1"></i>
        Saved
      </span>
      <span class="d-flex flex-column align-items-center" style="cursor: pointer;">
        <i class="bi bi-person fs-5 mb-1"></i>
        Profile
      </span>
    </nav>
  </div>

</body>

</html>
