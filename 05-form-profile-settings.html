<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Result 05 - Profile Settings Form Demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="05-form-profile-settings.css" />
</head>

<body data-theme="hig" data-viewport="web">
  <main class="container-fluid px-4 py-4" style="max-width: 860px">
    <section class="content-card p-4">
      <header class="d-flex align-items-center justify-content-between mb-4">
        <h1>Profile Settings</h1>
        <span class="badge badge-soft">Demo Result</span>
      </header>

      <form class="row g-3">
        <section class="col-12 content-card p-4">

          <div class="d-flex justify-content-center mb-4">
            <img src="https://i.pravatar.cc/100?u=alex" alt="Alex Johnson's Avatar" class="profile-avatar" />
          </div>

          <h2 class="h5 mb-3">Account</h2>
          <div class="mb-3">
            <label for="fullName" class="form-label">Full Name</label>
            <input id="fullName" class="form-control" type="text" value="Alex Johnson" />
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input id="email" class="form-control" type="email" value="alex@example.com" />
          </div>

          <div>
            <label for="language" class="form-label">Language</label>
            <select id="language" class="form-select">
              <option>English</option>
              <option>Vietnamese</option>
              <option>Japanese</option>
            </select>
          </div>
        </section>

        <section class="col-12 content-card p-4">
          <h2 class="h5 mb-3">Preferences</h2>
          <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" id="chk1" checked />
            <label class="form-check-label" for="chk1">Email notifications</label>
          </div>
          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="chk2" />
            <label class="form-check-label" for="chk2">Marketing updates</label>
          </div>

          <label for="theme" class="form-label">Theme</label>
          <select id="theme" class="form-select">
            <option>Light</option>
            <option>Dark</option>
            <option>System</option>
          </select>
        </section>

        <section class="col-12 content-card p-4 d-flex align-items-center justify-content-between">
          <div class="d-flex gap-2">
            <button type="button" class="btn btn-outline-brand">Change Password</button>
            <button type="button" class="btn btn-outline-brand">Enable 2FA</button>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-brand">Save Changes</button>
            <button type="button" class="btn btn-outline-brand">Cancel</button>
          </div>
        </section>
      </form>
    </section>
  </main>
</body>

</html>
