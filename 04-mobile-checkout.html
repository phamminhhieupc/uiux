<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mobile Checkout</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
    crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="04-mobile-checkout.css">
</head>

<body class="bg-secondary-subtle">

  <div class="mobile-container bg-light shadow-lg">

    <header
      class="bg-white sticky-top d-flex justify-content-between align-items-center p-3 border-bottom shadow-sm z-3">
      <a href="#" class="text-dark fs-5"><i class="bi bi-chevron-left"></i></a>
      <h1 class="h6 mb-0 fw-bold">Checkout</h1>
      <div style="width: 24px;"></div>
    </header>

    <main class="p-3 content-scroll">

      <section class="checkout-card bg-white p-3 rounded-4 shadow-sm mb-3">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <h2 class="h6 text-muted mb-0">Delivery Address</h2>
          <button type="button"
            class="btn btn-link text-primary text-decoration-none p-0 fw-semibold fs-7">Change</button>
        </div>
        <div class="d-flex align-items-start gap-3 mt-3">
          <div
            class="icon-box bg-danger-subtle text-danger rounded-circle d-flex justify-content-center align-items-center">
            <i class="bi bi-geo-alt-fill"></i>
          </div>
          <div>
            <p class="mb-0 fw-semibold text-dark">Home</p>
            <p class="mb-0 text-muted small">123 Lake Street, District 2</p>
          </div>
        </div>
      </section>

      <section class="checkout-card bg-white p-3 rounded-4 shadow-sm mb-3">
        <h2 class="h6 text-muted mb-3">Items (2)</h2>

        <article class="d-flex justify-content-between align-items-center mb-3 pb-3 border-bottom">
          <div class="d-flex gap-3 align-items-center">
            <div class="product-img bg-light rounded-3 d-flex justify-content-center align-items-center text-muted">
              <i class="bi bi-headset fs-4"></i>
            </div>
            <div>
              <h3 class="h6 fw-semibold mb-1 text-dark">Wireless Headphones</h3>
              <p class="text-muted small mb-0">Qty: 1</p>
            </div>
          </div>
          <p class="fw-bold text-dark mb-0">$79</p>
        </article>

        <article class="d-flex justify-content-between align-items-center">
          <div class="d-flex gap-3 align-items-center">
            <div class="product-img bg-light rounded-3 d-flex justify-content-center align-items-center text-muted">
              <i class="bi bi-phone fs-4"></i>
            </div>
            <div>
              <h3 class="h6 fw-semibold mb-1 text-dark">Phone Stand</h3>
              <p class="text-muted small mb-0">Qty: 2</p>
            </div>
          </div>
          <p class="fw-bold text-dark mb-0">$24</p>
        </article>
      </section>

      <section class="checkout-card bg-white p-3 rounded-4 shadow-sm mb-4">
        <h2 class="h6 text-muted mb-3">Payment Method</h2>
        <form class="d-flex flex-column gap-2">

          <label class="payment-option">
            <input type="radio" name="pay" class="payment-radio" checked />
            <div class="payment-content d-flex align-items-center gap-3 p-3 rounded-3 border">
              <i class="bi bi-credit-card-2-front text-primary fs-5"></i>
              <span class="fw-medium flex-grow-1">Credit Card</span>
              <i class="bi bi-check-circle-fill check-icon text-primary fs-5"></i>
            </div>
          </label>

          <label class="payment-option">
            <input type="radio" name="pay" class="payment-radio" />
            <div class="payment-content d-flex align-items-center gap-3 p-3 rounded-3 border">
              <i class="bi bi-wallet2 text-warning fs-5"></i>
              <span class="fw-medium flex-grow-1">E-Wallet</span>
              <i class="bi bi-check-circle-fill check-icon text-primary fs-5"></i>
            </div>
          </label>

          <label class="payment-option">
            <input type="radio" name="pay" class="payment-radio" />
            <div class="payment-content d-flex align-items-center gap-3 p-3 rounded-3 border">
              <i class="bi bi-cash-stack text-success fs-5"></i>
              <span class="fw-medium flex-grow-1">Cash on Delivery</span>
              <i class="bi bi-check-circle-fill check-icon text-primary fs-5"></i>
            </div>
          </label>

        </form>
      </section>

    </main>

    <footer class="bg-white p-3 border-top shadow-lg checkout-footer">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <p class="text-muted mb-0">Total Payment</p>
        <p class="h4 fw-bold text-dark mb-0">$103</p>
      </div>
      <button type="button" class="btn btn-primary w-100 py-3 rounded-4 fw-bold fs-6">
        Place Order
      </button>
    </footer>

  </div>

</body>

</html>
